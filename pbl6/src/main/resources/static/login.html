<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangiLeak - Login</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    form {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    }
    input {
      padding: 12px;
      margin: 10px 0;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .back-link {
      display: block;
      margin-top: 15px;
      color: #1e3a5f;
      text-decoration: none;
      font-weight: bold;
    }
    #error-message {
      color: red;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <header>
    <h1>LangiLeak</h1>
  </header>

  <main>
    <h2>Saioa Hasi (Iniciar Sesión)</h2>

    <div id="error-message"></div>

    <form id="loginForm">
      <div>
        <input type="text" id="username" placeholder="Erabiltzailea (Usuario)" required>
      </div>
      <div>
        <input type="password" id="password" placeholder="Pasahitza (Contraseña)" required>
      </div>
      <button type="submit">Sartu</button>
    </form>

    <a href="index.html" class="back-link">← Atzera</a>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault(); // Evita que la página se rompa o recargue mal
      
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-message');

      // Enviamos los datos al servidor de forma segura
      fetch(`/api/login?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`, {
        method: 'POST'
      })
      .then(response => response.text())
      .then(resultado => {
        if (resultado === "OK") {
          errorDiv.innerText = "";
          // ¡MAGIA! Abre una pestaña nueva con tu página de fondo rojo
          window.open('main.html', '_blank');
        } else if (resultado === "Ez da existitzen") {
          errorDiv.innerText = "Errorea: Erabiltzailea ez da existitzen.";
        } else {
          errorDiv.innerText = "Errorea: Pasahitz okerra.";
        }
      })
      .catch(err => {
        errorDiv.innerText = "Errorea zerbitzarian. Ziurtatu proiektua por t8080 dabilela.";
      });
    });
  </script>
</body>
</html>
