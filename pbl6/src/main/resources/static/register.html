<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangiLeak - Kontua Sortu</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    form {
      background-color: white;
      padding: 30px;
      border-radius: 10px;
      display: inline-block;
      box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
    }
    input {
      padding: 12px;
      margin: 10px 0;
      width: 250px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    .back-link {
      display: block;
      margin-top: 15px;
      color: #1e3a5f;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <h1>LangiLeak</h1>
  </header>

  <main>
    <h2>Kontua Sortu (Registrarse)</h2>

    <form action="/api/register" method="POST">
      <div>
        <input type="text" name="username" placeholder="Erabiltzailea (Usuario)" required>
      </div>
      <div>
        <input type="password" name="password" placeholder="Pasahitza (Contraseña)" required>
      </div>
      <button type="submit">Eman izena</button>
    </form>

    <a href="index.html" class="back-link">← Atzera</a>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
