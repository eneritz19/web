<!DOCTYPE html>
<html lang="eu">

<head>

  <meta charset="UTF-8">

  <title>LangiLeak - Main</title>

  <style>

    body {
      background-color: #ff4d4d;
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
      padding-top: 150px;
    }

    h1 {
      font-size: 50px;
    }

    button {

      margin-top: 30px;

      padding: 12px 24px;

      border: none;

      border-radius: 8px;

      background-color: white;

      color: #ff4d4d;

      font-size: 16px;

      cursor: pointer;
    }

  </style>

</head>

<body>

<h1 id="welcome"></h1>

<p>Aplikazioa ongi kargatu da.</p>

<button onclick="logout()">Logout</button>

<script>

const username = localStorage.getItem("username");

if(!username) {

    window.location.href = "login.html";

}

document.getElementById("welcome")
.innerText = `Ongi etorri, ${username}!`;

function logout() {

    localStorage.removeItem("username");

    window.location.href = "index.html";

}

</script>

</body>
</html>
